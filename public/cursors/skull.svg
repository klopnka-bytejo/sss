<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
  <defs>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4fd8ff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#00a8ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0066cc" stop-opacity="0.85"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="45%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Blue glow ellipses behind eye sockets -->
  <ellipse cx="11" cy="22" rx="3.2" ry="4" fill="url(#eyeGlow)" filter="url(#outerGlow)"/>
  <ellipse cx="21" cy="22" rx="3.2" ry="4" fill="url(#eyeGlow)" filter="url(#outerGlow)"/>

  <!-- Skull body — flame-pointed top, narrow face, rounded jaw, with eye socket cutouts via evenodd -->
  <path fill-rule="evenodd" fill="url(#bodyGrad)" stroke="#2a2a2a" stroke-width="0.4"
        d="M 16 1
           C 15.2 5, 13.5 9, 11 13
           C 8 17, 6.5 21, 6.5 25
           C 6.5 30, 8.5 34, 11.5 36.5
           C 13 37.5, 14.5 38.2, 16 38.5
           C 17.5 38.2, 19 37.5, 20.5 36.5
           C 23.5 34, 25.5 30, 25.5 25
           C 25.5 21, 24 17, 21 13
           C 18.5 9, 16.8 5, 16 1 Z

           M 11 18.2
           C 9 18.2, 7.8 20, 7.8 22
           C 7.8 24, 9 25.8, 11 25.8
           C 13 25.8, 14.2 24, 14.2 22
           C 14.2 20, 13 18.2, 11 18.2 Z

           M 21 18.2
           C 19 18.2, 17.8 20, 17.8 22
           C 17.8 24, 19 25.8, 21 25.8
           C 23 25.8, 24.2 24, 24.2 22
           C 24.2 20, 23 18.2, 21 18.2 Z"/>

  <!-- Teeth notches at bottom jaw -->
  <rect x="12.5" y="35.5" width="0.9" height="2.4" fill="#000" rx="0.3"/>
  <rect x="15.5" y="36" width="0.9" height="2.4" fill="#000" rx="0.3"/>
  <rect x="18.5" y="35.5" width="0.9" height="2.4" fill="#000" rx="0.3"/>

  <!-- Subtle highlight on top spike for premium look -->
  <path d="M 16 2 L 15.2 6 L 16 7 L 16.8 6 Z" fill="#2a2a2a" opacity="0.6"/>

  <!-- Inner eye pupil highlight -->
  <circle cx="11" cy="21" r="1" fill="#ffffff" opacity="0.75"/>
  <circle cx="21" cy="21" r="1" fill="#ffffff" opacity="0.75"/>
</svg>
